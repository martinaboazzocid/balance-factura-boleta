<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAS Chile · Dashboard Ventas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F6F5F0;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,.07);
    --border-strong: rgba(0,0,0,.13);
    --text: #18181A;
    --muted: #6A6965;
    --hint: #A09D96;
    --factura-color: #0F54A4;
    --factura-bg: #E8F0FA;
    --boleta-color: #9A5100;
    --boleta-bg: #FEF2E2;
    --zas-color: #1A6E44;
    --zas-bg: #E3F5EC;
    --warn-color: #7A5200;
    --warn-bg: #FFF8E6;
    --danger-color: #A01C1C;
    --danger-bg: #FDEAEA;
    --r: 8px;
    --r-lg: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
  }

  /* ── Layout ── */
  .wrap { max-width: 1120px; margin: 0 auto; padding: 32px 22px 72px; }

  /* ── Header ── */
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
  .top-bar h1 { font-size: 21px; font-weight: 600; letter-spacing: -.3px; }
  .top-bar p  { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
    border: 1px solid var(--border-strong); border-radius: var(--r);
    background: var(--surface); color: var(--text);
    font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none;
    transition: background .1s;
  }
  .btn:hover { background: var(--bg); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-primary { background: var(--text); color: #fff; border-color: var(--text); }
  .btn-primary:hover { background: #2a2a2e; }
  .btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ── Drive input ── */
  .drive-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-lg); padding: 14px 18px; margin-bottom: 20px;
  }
  .drive-row label { font-size: 12px; font-weight: 500; color: var(--muted); white-space: nowrap; }
  .drive-row input {
    flex: 1; min-width: 200px; padding: 7px 11px;
    border: 1px solid var(--border-strong); border-radius: var(--r);
    font-size: 13px; background: var(--bg); color: var(--text); outline: none;
  }
  .drive-row input:focus { border-color: var(--factura-color); }
  #driveMsg { font-size: 12px; color: var(--muted); }

  /* ── KPI cards ── */
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px 18px; }
  .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 7px; }
  .kpi-val { font-size: 24px; font-weight: 600; letter-spacing: -.5px; line-height: 1; }
  .kpi-sub  { font-size: 12px; color: var(--hint); margin-top: 5px; }
  .kpi-val.blue   { color: var(--factura-color); }
  .kpi-val.amber  { color: var(--boleta-color); }
  .kpi-val.green  { color: var(--zas-color); }

  /* ── Info banner ── */
  .info-banner {
    background: var(--warn-bg); border: 1px solid rgba(180,120,0,.2);
    border-radius: var(--r); padding: 10px 14px; font-size: 12px;
    color: var(--warn-color); margin-bottom: 16px; line-height: 1.55;
  }

  /* ── Section cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-lg); margin-bottom: 18px; overflow: hidden;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px; padding: 16px 18px 0;
  }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-body  { padding: 14px 18px 18px; }

  /* ── Legend ── */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .leg-dot  { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* ── Chart ── */
  .chart-box { position: relative; width: 100%; }

  /* ── Tables ── */
  .tbl-wrap { overflow-x: auto; }
  table  { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; padding: 8px 11px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px;
    color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg);
    white-space: nowrap;
  }
  th.r, td.r { text-align: right; }
  td { padding: 9px 11px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FAFAF7; }
  tr.sum-row td { background: #F3F2EE; font-weight: 600; border-top: 1px solid var(--border-strong); border-bottom: none; }

  /* ── Pills ── */
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .pill-f { background: var(--factura-bg); color: var(--factura-color); }
  .pill-b { background: var(--boleta-bg);  color: var(--boleta-color); }
  .pill-n { background: #EDEDEA; color: var(--muted); }

  /* ── Bar inline ── */
  .bar-row { display: flex; align-items: center; gap: 6px; }
  .bar-bg   { flex: 1; height: 5px; background: #EDECEA; border-radius: 3px; overflow: hidden; min-width: 50px; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--factura-color); }
  .bar-pct  { font-size: 11px; color: var(--hint); min-width: 30px; text-align: right; }

  /* ── USD tag ── */
  .usd-tag { font-size: 10px; color: var(--hint); background: #EDEDEA; padding: 1px 5px; border-radius: 3px; }

  /* ── States ── */
  .state-box { text-align: center; padding: 52px 20px; }
  .state-box .spin {
    width: 22px; height: 22px; border: 2px solid var(--border-strong);
    border-top-color: var(--text); border-radius: 50%;
    animation: spin .65s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .state-box p  { font-size: 13px; color: var(--muted); max-width: 360px; margin: 0 auto; }
  .err-box {
    background: var(--danger-bg); border: 1px solid rgba(160,28,28,.15);
    border-radius: var(--r); padding: 14px 16px; font-size: 13px;
    color: var(--danger-color); line-height: 1.55;
  }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); padding: 0 18px; }
  .tab {
    padding: 10px 13px; font-size: 13px; font-weight: 500;
    border: none; background: none; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab.on { color: var(--text); border-bottom-color: var(--text); }
  .tab:hover { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.on { display: block; }

  /* ── Responsive ── */
  @media (max-width: 580px) {
    .wrap { padding: 18px 14px 50px; }
    .kpi-val { font-size: 19px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="top-bar">
    <div>
      <h1>ZAS Chile · Ventas</h1>
      <p id="updateLine">Conectando con Odoo…</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="reload()" id="reloadBtn">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
        Actualizar
      </button>
    </div>
  </div>

  <!-- Drive row -->
  <div class="drive-row">
    <label>% talento (Drive):</label>
    <input type="text" id="driveInput" placeholder="Pegar link de Google Sheets con columnas Talento / Porcentaje …" />
    <button class="btn btn-primary btn-sm" onclick="loadDrive()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Cargar %
    </button>
    <span id="driveMsg"></span>
  </div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label">Total neto · Chile</div>
      <div class="kpi-val" id="kTotal">—</div>
      <div class="kpi-sub" id="kOrdenes">cargando…</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Factura · entra a ZAS</div>
      <div class="kpi-val blue" id="kFactura">—</div>
      <div class="kpi-sub" id="kFacturaPct"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Boleta · entra a tercero</div>
      <div class="kpi-val amber" id="kBoleta">—</div>
      <div class="kpi-sub" id="kBoletaPct"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">ZAS neto est. (sobre factura)</div>
      <div class="kpi-val green" id="kZas">—</div>
      <div class="kpi-sub" id="kZasSub">split promedio por talento</div>
    </div>
  </div>

  <!-- Main body -->
  <div id="body">
    <div class="card">
      <div class="card-body">
        <div class="state-box">
          <div class="spin"></div>
          <h3>Cargando ventas de ZAS Chile</h3>
          <p>Consultando Odoo en tiempo real. Puede tomar unos segundos…</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
/* ════════════════════════════════════════════
   CONSTANTES Y ESTADO
════════════════════════════════════════════ */
const API   = 'https://api.anthropic.com/v1/messages';
const MCP   = 'https://zas-agent-api.quantumsur.ai/api/mcp';
const MODEL = 'claude-sonnet-4-6';

// Promedios mensuales BCCH (fallback si Odoo no trae currency_rate)
// Fuente: serie F073 Banco Central de Chile
const FX_FALLBACK = {
  '2024-01':969,'2024-02':981,'2024-03':988,'2024-04':960,'2024-05':897,
  '2024-06':931,'2024-07':943,'2024-08':938,'2024-09':942,'2024-10':952,
  '2024-11':971,'2024-12':997,'2025-01':1010,'2025-02':998,'2025-03':990,
  '2025-04':969,'2025-05':944,'2025-06':951,'2025-07':953,'2025-08':945,
  '2025-09':955,'2025-10':963,'2025-11':971,'2025-12':981,'2026-01':988,
  '2026-02':970,'2026-03':960,'2026-04':945,'2026-05':935,'2026-06':942,
};

let allOrders  = [];  // array de órdenes procesadas
let talentPcts = {};  // { "CARLITA": 72, … } desde Drive
let chart1     = null;

const MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

/* ════════════════════════════════════════════
   UTILIDADES
════════════════════════════════════════════ */
const fmt = n => '$\u2009' + Math.round(n).toLocaleString('es-CL');
const pct  = (a,b) => b ? Math.round(a/b*100) : 0;
const mk   = d => d ? d.slice(0,7) : '????-??';
const mlbl = k => { const[y,m]=k.split('-'); return MES[+m-1]+' '+y.slice(2); };

function toCLP(amount, currency, dateStr, odooRate) {
  if (!currency || currency === 'CLP') return +amount;
  if (currency === 'USD') {
    // Odoo guarda el rate como USD→CLP (currency_rate ≈ 0.00109 es CLP por unidad CLP,
    // pero en realidad es el inverse; en Zas Talents el rate guardado en sale.order.line
    // es el mismo que en sale.order: 0.00109... = 1/916 ≈ CLP_per_USD-inverse
    // Validamos: si rate < 0.01 asumimos que es 1/(CLP per USD)
    let clpPerUsd;
    if (odooRate && odooRate > 0) {
      clpPerUsd = odooRate < 0.1 ? Math.round(1 / odooRate) : odooRate;
    } else {
      clpPerUsd = FX_FALLBACK[mk(dateStr)] || 960;
    }
    return +amount * clpPerUsd;
  }
  return +amount;
}

function parseTalent(name) {
  if (!name) return null;
  const m = name.match(/^([^(]+)/);
  const raw = m ? m[1].trim() : name.trim();
  return raw.toUpperCase().replace(/\s+/g,' ');
}

function getTalentPct(name) {
  if (!name) return 70;
  const k = name.toUpperCase();
  if (talentPcts[k] != null) return talentPcts[k];
  for (const [key, val] of Object.entries(talentPcts)) {
    if (k.includes(key) || key.includes(k)) return val;
  }
  return 70;
}

/* ════════════════════════════════════════════
   API CLAUDE
════════════════════════════════════════════ */
async function claudeCall(system, user, maxTok = 8000) {
  const r = await fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: maxTok,
      system,
      messages: [{ role: 'user', content: user }],
      mcp_servers: [{ type: 'url', url: MCP, name: 'zas-os' }]
    })
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// Extrae rows de cualquier bloque mcp_tool_result
function extractRows(data) {
  const rows = [];
  for (const b of (data.content || [])) {
    if (b.type !== 'mcp_tool_result') continue;
    try {
      const parsed = JSON.parse(b.content?.[0]?.text || '{}');
      const rr = parsed?.result?.rows || parsed?.rows || [];
      rows.push(...rr);
    } catch {}
  }
  return rows;
}

/* ════════════════════════════════════════════
   FETCH VENTAS CHILE
════════════════════════════════════════════ */
async function fetchOrders() {
  // Traer órdenes ZAS CHILE — pedimos hasta 50 (máximo seguro por tamaño)
  const data = await claudeCall(
    'Eres un extractor de datos Odoo. Usa SIEMPRE las herramientas MCP disponibles. No respondas sin haberlas llamado.',
    `Llama a odoo_search_rows del MCP zas-os con estos parámetros exactos:
- model: "sale.order"
- filters: [{"field":"x_studio_bu_1","operator":"eq","value":"ZAS CHILE"}]
- order: "odoo_id_desc"
- limit: 50
Llama la herramienta AHORA y devuelve el resultado.`
  );
  return extractRows(data);
}

async function fetchLines(orderIds) {
  if (!orderIds.length) return [];
  const data = await claudeCall(
    'Eres un extractor de datos Odoo. Usa las herramientas MCP disponibles.',
    `Llama a odoo_search_rows del MCP zas-os con estos parámetros exactos:
- model: "sale.order.line"
- filters: [{"field":"order_id","operator":"in","value":[${orderIds.join(',')}]}]
- order: "odoo_id_asc"
- limit: 100
Llama la herramienta AHORA.`
  );
  return extractRows(data);
}

/* ════════════════════════════════════════════
   PROCESO DATOS
════════════════════════════════════════════ */
function parseOrder(row) {
  const p = row.latestPayload || {};
  return {
    id:        row.odooId,
    name:      p.name || '',
    date:      (p.date_order || '').slice(0,10),
    state:     p.state || '',
    currency:  p.currency_id?.[1] || 'CLP',
    rate:      +(p.currency_rate || 0),   // Odoo rate (puede ser inverse)
    netOrig:   +(p.amount_untaxed || 0),
    tipo:      p.x_studio_factura_o_boleta || '',
    bu:        p.x_studio_bu_1 || '',
    lineIds:   p.order_line || [],
    campaña:   p.x_studio_nombre_de_la_campaa || '',
    lines:     [],
    netCLP:    0,
  };
}

function enrichOrders(orders, lineRows) {
  // Index lines by order_id
  const byOrder = {};
  for (const lr of lineRows) {
    const p = lr.latestPayload || {};
    if (p.display_type) continue;          // skip section headers
    const oid = p.order_id?.[0];
    if (!oid) continue;
    if (!byOrder[oid]) byOrder[oid] = [];
    byOrder[oid].push({
      name:     p.name || '',
      subtotal: +(p.price_subtotal || 0),
      currency: p.currency_id?.[1] || 'CLP',
      rate:     +(p.currency_rate || 0),
    });
  }

  for (const o of orders) {
    if (o.state === 'cancel' || o.state === 'draft') continue;
    o.netCLP = toCLP(o.netOrig, o.currency, o.date, o.rate);
    o.lines  = (byOrder[o.id] || []).map(l => ({
      talent:   parseTalent(l.name),
      subtotal: toCLP(l.subtotal, l.currency || o.currency, o.date, l.rate || o.rate),
    })).filter(l => l.talent && l.talent.length > 1);
    o.tipo = o.tipo === 'Factura' ? 'Factura' : o.tipo === 'Boleta' ? 'Boleta' : '';
  }

  return orders.filter(o => o.state !== 'cancel' && o.state !== 'draft' && o.bu === 'ZAS CHILE');
}

/* ════════════════════════════════════════════
   AGREGACIONES
════════════════════════════════════════════ */
function buildMonthMap(orders) {
  const m = {};
  for (const o of orders) {
    const key = mk(o.date);
    if (!m[key]) m[key] = { f:0, b:0, n:0, usd:false, count:0 };
    m[key].count++;
    if (o.currency === 'USD') m[key].usd = true;
    if (o.tipo === 'Factura')  m[key].f += o.netCLP;
    else if (o.tipo === 'Boleta') m[key].b += o.netCLP;
    else                          m[key].n += o.netCLP;
  }
  return m;
}

function buildTalentMap(orders) {
  const t = {};
  for (const o of orders) {
    const addLine = (talent, clp) => {
      if (!t[talent]) t[talent] = { f:0, b:0, n:0, months: new Set() };
      t[talent].months.add(mk(o.date));
      if (o.tipo === 'Factura')     t[talent].f += clp;
      else if (o.tipo === 'Boleta') t[talent].b += clp;
      else                          t[talent].n += clp;
    };

    if (o.lines.length) {
      o.lines.forEach(l => addLine(l.talent, l.subtotal));
    } else {
      addLine('(sin desglose)', o.netCLP);
    }
  }
  return t;
}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function updateKPIs(orders) {
  const totF = orders.filter(o => o.tipo==='Factura').reduce((s,o)=>s+o.netCLP,0);
  const totB = orders.filter(o => o.tipo==='Boleta').reduce((s,o)=>s+o.netCLP,0);
  const totN = orders.filter(o => o.tipo==='').reduce((s,o)=>s+o.netCLP,0);
  const tot  = totF + totB + totN;

  // ZAS neto estimado: promedio de splits por talento sobre ventas con factura
  const tasMap = buildTalentMap(orders.filter(o => o.tipo==='Factura'));
  let zasEst = 0;
  for (const [name, d] of Object.entries(tasMap)) {
    const talPct = getTalentPct(name);
    const total  = d.f + d.b + d.n;
    zasEst += total * (1 - talPct/100);
  }

  document.getElementById('kTotal').textContent    = fmt(tot);
  document.getElementById('kOrdenes').textContent  = `${orders.length} órdenes confirmadas`;
  document.getElementById('kFactura').textContent  = fmt(totF);
  document.getElementById('kFacturaPct').textContent = tot ? `${pct(totF,tot)}% del total` : '';
  document.getElementById('kBoleta').textContent   = fmt(totB);
  document.getElementById('kBoletaPct').textContent  = tot ? `${pct(totB,tot)}% del total` : '';
  document.getElementById('kZas').textContent      = fmt(zasEst);
}

function renderChart(monthMap) {
  if (chart1) { chart1.destroy(); chart1 = null; }
  const keys  = Object.keys(monthMap).sort();
  const ctx   = document.getElementById('ch1');
  if (!ctx) return;
  chart1 = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: keys.map(mlbl),
      datasets: [
        { label:'Factura', data: keys.map(k=>Math.round(monthMap[k].f)), backgroundColor:'#0F54A4', borderRadius:3 },
        { label:'Boleta',  data: keys.map(k=>Math.round(monthMap[k].b)), backgroundColor:'#E69200', borderRadius:3 },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false },
        tooltip:{ callbacks:{ label: c=>' '+fmt(c.raw) } }
      },
      scales:{
        x:{ ticks:{ autoSkip:false, maxRotation:45, font:{size:11} }, grid:{display:false} },
        y:{ ticks:{ callback: v => v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v, font:{size:11} },
            grid:{ color:'rgba(0,0,0,.05)' } }
      }
    }
  });
}

function monthTable(monthMap) {
  const keys = Object.keys(monthMap).sort();
  let tF=0,tB=0,tN=0;
  const rows = keys.map(k => {
    const {f,b,n,usd,count} = monthMap[k];
    const tot = f+b+n;
    const p = pct(f,tot);
    tF+=f; tB+=b; tN+=n;
    return `<tr>
      <td><b style="font-weight:500">${mlbl(k)}</b></td>
      <td class="r" style="color:var(--factura-color)">${fmt(f)}</td>
      <td class="r" style="color:var(--boleta-color)">${fmt(b)}</td>
      <td class="r" style="color:var(--hint)">${n?fmt(n):'—'}</td>
      <td class="r">${fmt(tot)}</td>
      <td style="min-width:90px"><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div><span class="bar-pct">${p}%</span></div></td>
      <td>${usd?'<span class="usd-tag">USD→CLP</span>':''}</td>
    </tr>`;
  }).join('');
  const gT=tF+tB+tN;
  return `<table>
    <thead><tr>
      <th>Mes</th><th class="r">Factura</th><th class="r">Boleta</th>
      <th class="r">Sin tipo</th><th class="r">Total neto</th>
      <th>Prop. F/B</th><th>FX</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="sum-row">
      <td>TOTAL</td>
      <td class="r" style="color:var(--factura-color)">${fmt(tF)}</td>
      <td class="r" style="color:var(--boleta-color)">${fmt(tB)}</td>
      <td class="r" style="color:var(--hint)">${tN?fmt(tN):'—'}</td>
      <td class="r">${fmt(gT)}</td><td></td><td></td>
    </tr></tfoot>
  </table>`;
}

function talentTable(orders) {
  const tm = buildTalentMap(orders);
  const sorted = Object.entries(tm)
    .map(([name,d]) => ({
      name, f:d.f, b:d.b, n:d.n,
      total: d.f+d.b+d.n,
      months:[...d.months].sort(),
      tPct: getTalentPct(name)
    }))
    .sort((a,b) => b.total - a.total);

  const rows = sorted.map(t => {
    const p = pct(t.f, t.total);
    const zasAmt = t.total * (1 - t.tPct/100);
    const talAmt = t.total * (t.tPct/100);
    return `<tr>
      <td>
        <div style="font-weight:500">${t.name}</div>
        <div style="font-size:11px;color:var(--hint)">${t.months.map(mlbl).join(', ')}</div>
      </td>
      <td class="r" style="color:var(--factura-color)">${fmt(t.f)}</td>
      <td class="r" style="color:var(--boleta-color)">${fmt(t.b)}</td>
      <td class="r">${fmt(t.total)}</td>
      <td style="min-width:90px"><div class="bar-row"><div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div><span class="bar-pct">${p}%</span></div></td>
      <td class="r">${t.tPct}%</td>
      <td class="r" style="color:var(--zas-color)">${fmt(zasAmt)}</td>
      <td class="r">${fmt(talAmt)}</td>
    </tr>`;
  }).join('');

  const tots = sorted.reduce((a,t)=>({f:a.f+t.f,b:a.b+t.b,tot:a.tot+t.total,
    zas:a.zas+t.total*(1-t.tPct/100),tal:a.tal+t.total*(t.tPct/100)}),{f:0,b:0,tot:0,zas:0,tal:0});

  return `<table>
    <thead><tr>
      <th>Talento</th><th class="r">Factura</th><th class="r">Boleta</th>
      <th class="r">Total neto</th><th>Split F/B</th>
      <th class="r">% Tal.</th><th class="r">Monto ZAS</th><th class="r">Monto Talento</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="sum-row">
      <td>TOTAL</td>
      <td class="r" style="color:var(--factura-color)">${fmt(tots.f)}</td>
      <td class="r" style="color:var(--boleta-color)">${fmt(tots.b)}</td>
      <td class="r">${fmt(tots.tot)}</td><td></td><td></td>
      <td class="r" style="color:var(--zas-color)">${fmt(tots.zas)}</td>
      <td class="r">${fmt(tots.tal)}</td>
    </tr></tfoot>
  </table>`;
}

function orderTable(orders) {
  const sorted = [...orders].sort((a,b) => b.date.localeCompare(a.date));
  const rows = sorted.slice(0,60).map(o => {
    const pilCls = o.tipo==='Factura'?'pill-f':o.tipo==='Boleta'?'pill-b':'pill-n';
    const pilTxt = o.tipo || '—';
    const origStr = o.currency==='USD'
      ? '$'+o.netOrig.toLocaleString()+' USD'
      : fmt(o.netOrig);
    return `<tr>
      <td style="font-weight:500">${o.name}</td>
      <td>${o.date}</td>
      <td><span class="pill ${pilCls}">${pilTxt}</span></td>
      <td class="r">${origStr}</td>
      <td class="r">${o.currency==='USD'?fmt(o.netCLP)+' <span class="usd-tag">conv.</span>':fmt(o.netCLP)}</td>
      <td style="font-size:11px;color:var(--muted);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.campaña}</td>
    </tr>`;
  }).join('');
  const extra = sorted.length>60
    ? `<tr><td colspan="6" style="text-align:center;color:var(--hint);font-size:12px;padding:12px">… y ${sorted.length-60} órdenes más</td></tr>`:'';
  return `<table>
    <thead><tr>
      <th>Orden</th><th>Fecha</th><th>Tipo</th>
      <th class="r">Importe orig.</th><th class="r">En CLP</th><th>Campaña</th>
    </tr></thead>
    <tbody>${rows}${extra}</tbody>
  </table>`;
}

function renderAll(orders) {
  const monthMap = buildMonthMap(orders);
  const keys     = Object.keys(monthMap).sort();
  const usdKeys  = keys.filter(k => monthMap[k].usd);

  updateKPIs(orders);

  const usdBanner = usdKeys.length
    ? `<div class="info-banner">⚠ Ventas en USD convertidas a CLP usando el tipo de cambio registrado en Odoo al momento de cada orden. Meses con conversión: ${usdKeys.map(mlbl).join(', ')}.</div>`
    : '';

  document.getElementById('body').innerHTML = `
    ${usdBanner}

    <!-- Mensual -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Resumen mensual · Factura vs Boleta</span>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#0F54A4"></div>Factura (entra a ZAS)</div>
          <div class="leg-item"><div class="leg-dot" style="background:#E69200"></div>Boleta (entra a tercero)</div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-box" style="height:${Math.max(180, keys.length*44+60)}px">
          <canvas id="ch1" role="img" aria-label="Barras mensuales Factura vs Boleta ZAS Chile">Resumen mensual ZAS Chile.</canvas>
        </div>
        <div style="margin-top:22px" class="tbl-wrap">
          ${monthTable(monthMap)}
        </div>
      </div>
    </div>

    <!-- Talentos tabs -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Por talento · split Factura / Boleta y distribución ZAS / Talento</span>
        <span style="font-size:12px;color:var(--muted)">% talento: ${Object.keys(talentPcts).length?'desde Drive':'estimado 70%'}</span>
      </div>
      <div class="card-body">
        <div class="tbl-wrap">${talentTable(orders)}</div>
      </div>
    </div>

    <!-- Órdenes -->
    <div class="card">
      <div class="card-head">
        <span class="card-title">Detalle de órdenes</span>
        <span style="font-size:12px;color:var(--muted)">${orders.length} confirmadas · mostrando últimas 60</span>
      </div>
      <div class="card-body">
        <div class="tbl-wrap">${orderTable(orders)}</div>
      </div>
    </div>
  `;

  requestAnimationFrame(() => renderChart(monthMap));

  document.getElementById('updateLine').textContent =
    `${orders.length} órdenes · actualizado ${new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`;
}

/* ════════════════════════════════════════════
   DRIVE
════════════════════════════════════════════ */
async function loadDrive() {
  const url = document.getElementById('driveInput').value.trim();
  if (!url) return;
  document.getElementById('driveMsg').textContent = 'Cargando…';
  try {
    const data = await claudeCall(
      'Eres un asistente que lee Google Sheets. Devuelve SOLO JSON válido, sin markdown ni texto extra.',
      `Lee el Google Sheets en: ${url}
El archivo tiene columnas: Talento (nombre) y Porcentaje (número, el % que corresponde al talento).
Devuelve SOLO este JSON (sin backticks, sin texto extra):
{"talents":[{"name":"NOMBRE","pct":70},...]}`
    );
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const clean = txt.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    talentPcts = {};
    (parsed.talents||[]).forEach(t => { talentPcts[t.name.toUpperCase()] = +t.pct; });
    document.getElementById('driveMsg').textContent = `✓ ${Object.keys(talentPcts).length} talentos cargados`;
    if (allOrders.length) renderAll(allOrders);
  } catch(e) {
    document.getElementById('driveMsg').textContent = 'Error: ' + e.message;
  }
}

/* ════════════════════════════════════════════
   LOAD PRINCIPAL
════════════════════════════════════════════ */
async function reload() {
  const btn = document.getElementById('reloadBtn');
  btn.disabled = true;
  setLoading('Obteniendo órdenes de ZAS CHILE…');

  try {
    // 1. Órdenes
    const rawOrders = await fetchOrders();
    const orders = rawOrders
      .filter(r => r.latestPayload?.x_studio_bu_1 === 'ZAS CHILE')
      .map(parseOrder);

    if (!orders.length) {
      setError('No se encontraron órdenes de ZAS CHILE en Odoo. Verificá la conexión o el filtro.');
      btn.disabled = false;
      return;
    }

    setLoading(`Cargando líneas de ${orders.length} órdenes…`);

    // 2. Líneas — en lotes de 20 IDs para no superar el budget
    const validIds = orders
      .filter(o => o.state !== 'cancel' && o.state !== 'draft')
      .slice(0, 40)
      .map(o => o.id);

    let lineRows = [];
    for (let i = 0; i < validIds.length; i += 20) {
      const batch = validIds.slice(i, i+20);
      const batchRows = await fetchLines(batch);
      lineRows.push(...batchRows);
    }

    // 3. Enriquecer y renderizar
    allOrders = enrichOrders(orders, lineRows);
    renderAll(allOrders);

  } catch(e) {
    setError(e.message || 'Error desconocido al conectar con Odoo.');
  } finally {
    btn.disabled = false;
  }
}

function setLoading(msg) {
  document.getElementById('body').innerHTML = `
    <div class="card"><div class="card-body">
      <div class="state-box">
        <div class="spin"></div>
        <h3>${msg}</h3>
        <p>Consultando Odoo en tiempo real…</p>
      </div>
    </div></div>`;
}

function setError(msg) {
  document.getElementById('body').innerHTML = `
    <div class="card"><div class="card-body">
      <div class="err-box">
        <b>Error al cargar datos</b><br>${msg}<br>
        <br><button class="btn btn-sm" onclick="reload()">Reintentar</button>
      </div>
    </div></div>`;
  document.getElementById('updateLine').textContent = 'Error de carga';
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
reload();
</script>
