<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAS Chile · Factura vs Boleta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#F5F4EF;--card:#FFFFFF;--border:#E4E3DC;
    --text:#16161A;--muted:#6B6966;--hint:#A09D97;
    --blue:#1059A8;--blue-bg:#EAF1FB;
    --amber:#9A5200;--amber-bg:#FEF3E3;
    --r:10px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
  .shell{max-width:1080px;margin:0 auto;padding:30px 20px 60px}
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .hdr p{font-size:13px;color:var(--muted);margin-top:3px}
  .tabs-nav{display:flex;border-bottom:2px solid var(--border);margin-bottom:22px}
  .tab-btn{padding:10px 20px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .12s}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
  .tab-btn:hover{color:var(--text)}
  .tab-pane{display:none}
  .tab-pane.active{display:block}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:18px;overflow:hidden}
  .card-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:16px 18px 0}
  .card-title{font-size:14px;font-weight:700}
  .card-body{padding:16px 18px 18px}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
  .kpi-lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
  .kpi-val{font-size:23px;font-weight:700;letter-spacing:-.5px;line-height:1}
  .kpi-sub{font-size:12px;color:var(--hint);margin-top:4px}
  .kpi-val.blue{color:var(--blue)}
  .kpi-val.amber{color:var(--amber)}
  .legend{display:flex;gap:14px;flex-wrap:wrap}
  .leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
  .leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
  .chart-wrap{position:relative;width:100%}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;padding:8px 11px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
  th.r,td.r{text-align:right}
  td{padding:9px 11px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#FAFAF7}
  tr.total-row td{background:#F3F2EE;font-weight:700;border-top:1px solid #D0CFC8;border-bottom:none}
  .prg{display:flex;align-items:center;gap:6px}
  .prg-bar{flex:1;min-width:60px;height:5px;background:#EDECEA;border-radius:3px;overflow:hidden}
  .prg-fill{height:100%;background:var(--blue);border-radius:3px}
  .prg-lbl{font-size:11px;color:var(--hint);min-width:34px;text-align:right}
  .search-wrap{position:relative;margin-bottom:18px}
  .search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;background:var(--card);color:var(--text);outline:none;transition:border-color .12s}
  .search-wrap input:focus{border-color:var(--blue)}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--hint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .talent-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .talent-chip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--card);color:var(--muted);transition:all .12s;white-space:nowrap}
  .talent-chip:hover{border-color:var(--blue);color:var(--blue)}
  .talent-chip.active{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:600}
  .talent-chip.todos{font-weight:600}
  .no-results{font-size:13px;color:var(--hint);padding:8px 0}
  .state-box{text-align:center;padding:50px 20px}
  .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .65s linear infinite;margin:0 auto 14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .state-box h3{font-size:15px;font-weight:700;margin-bottom:6px}
  .state-box p{font-size:13px;color:var(--muted);max-width:360px;margin:0 auto}
  .usd-tag{font-size:10px;background:#EEEDEA;color:var(--hint);padding:1px 5px;border-radius:3px}
  .note{background:#FEF9E7;border:1px solid #F5E07A;border-radius:var(--r);padding:10px 14px;font-size:12px;color:#856400;margin-bottom:16px}
  .err{background:#FDEAEA;border:1px solid #F5C0C0;border-radius:var(--r);padding:14px 16px;font-size:13px;color:#9B1C1C;line-height:1.6}
  .mes-row{cursor:pointer;user-select:none}
  .mes-row:hover td{background:#EEF4FC!important}
  .mes-row.abierto td{background:#EEF4FC!important}
  .mes-toggle{display:inline-flex;align-items:center;gap:6px}
  .mes-toggle svg{width:13px;height:13px;stroke:var(--hint);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s;flex-shrink:0}
  .mes-row.abierto .mes-toggle svg{transform:rotate(90deg);stroke:var(--blue)}
  .detalle-row td{padding:0!important;border-bottom:1px solid var(--border)}
  .detalle-inner{padding:12px 14px 14px;background:#F7F9FD;border-top:1px solid #D4E2F5}
  .detalle-inner table{font-size:12px;margin-top:0}
  .detalle-inner thead th{background:#EDF2FB;font-size:10px}
  .pill{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
  .pill-f{background:#DBEAFE;color:#1059A8}
  .pill-b{background:#FEF3E3;color:#9A5200}
  .deuda-box{border-radius:var(--r);padding:16px 18px;margin-bottom:18px}
  .deuda-box.zas-debe{background:#FEF3E3;border:1px solid #F5C59A}
  .deuda-box.talento-debe{background:#E3F5EC;border:1px solid #8DDDB0}
  .deuda-box.neutro{background:#F5F4EF;border:1px solid var(--border)}
  .deuda-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .deuda-title.zas-debe{color:var(--amber)}
  .deuda-title.talento-debe{color:#1A7A47}
  .deuda-title.neutro{color:var(--muted)}
  .deuda-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .deuda-item{display:flex;flex-direction:column;gap:3px}
  .deuda-item-lbl{font-size:11px;color:var(--muted)}
  .deuda-item-val{font-size:17px;font-weight:700;letter-spacing:-.3px}
  .fee-input-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .fee-input-wrap label{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap}
  .fee-input-wrap input[type=number]{width:90px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-weight:700;color:var(--text);background:var(--bg);outline:none;text-align:center;transition:border-color .12s}
  .fee-input-wrap input[type=number]:focus{border-color:var(--blue)}
  .fee-input-wrap .fee-hint{font-size:12px;color:var(--hint)}
  @media(max-width:580px){.shell{padding:18px 14px 50px}.kpi-val{font-size:19px}}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div>
      <h1>ZAS Chile · Factura vs Boleta</h1>
      <p id="subtitle">Cargando…</p>
    </div>
  </div>
  <div class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('general',this)">Venta general</button>
    <button class="tab-btn"        onclick="switchTab('talento',this)">Por talento</button>
  </div>
  <div id="tab-general" class="tab-pane active">
    <div class="card"><div class="card-body">
      <div class="state-box"><div class="spinner"></div><h3>Cargando datos…</h3></div>
    </div></div>
  </div>
  <div id="tab-talento" class="tab-pane">
    <div class="card"><div class="card-body">
      <div class="state-box"><h3>Cargando…</h3></div>
    </div></div>
  </div>
</div>

<script>
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let c1=null, c2=null, DATA=null, talSel='(Todos)';

function clp(n){ return '$\u202F'+Math.round(n).toLocaleString('es-CL'); }
function ml(k){ const[y,m]=k.split('-'); return MESES[+m-1]+' '+y.slice(2); }
function pct(a,t){ return t?Math.round(a/t*100)+'%':'—'; }

function pagoTalento(nombre){
  const p = (DATA.pagos || {})[nombre];
  return p ? {total: p.total || 0, n: p.n || 0} : {total: 0, n: 0};
}

function calcularBalance(){
  const input = document.getElementById('pctZasInput');
  if(!input || !talSel || talSel==='(Todos)') return;
  const val = parseFloat(input.value);
  if(isNaN(val) || val < 0 || val > 100) return;
  const pctZas = val / 100;
  const pctTal = 1 - pctZas;

  const talentos = DATA.talentos;
  const mesesData = talentos[talSel] || {};

  let totalF = 0, totalB = 0;
  Object.values(mesesData).forEach(d => { totalF += d.f; totalB += d.b; });

  // Factura: ZAS cobró el 100% → le debe al talento su parte (pctTal de las facturas)
  const zasDebePorFactura = totalF * pctTal;
  // Boleta: el talento cobró el 100% → le debe a ZAS su comisión (pctZas de las boletas)
  const talentoDebePorBoleta = totalB * pctZas;
  // Lo que ZAS ya le pagó al talento (planilla de pagos, todos los estados)
  const yaPagado = pagoTalento(talSel).total;

  // Saldo desde la perspectiva de ZAS:
  //   +  lo que ZAS debe al talento por facturas
  //   −  lo ya pagado por ZAS
  //   −  lo que el talento debe a ZAS por boletas
  const saldo = zasDebePorFactura - yaPagado - talentoDebePorBoleta;

  const box = document.getElementById('balanceBox');
  if(!box) return;

  let cls, titulo, saldoLbl;
  if(saldo > 0){
    cls = 'zas-debe';
    titulo = 'ZAS tiene un saldo pendiente con el talento';
    saldoLbl = 'ZAS aún debe pagar';
  } else if(saldo < 0){
    cls = 'talento-debe';
    titulo = 'El talento tiene saldo a favor de ZAS';
    saldoLbl = 'A favor de ZAS';
  } else {
    cls = 'neutro';
    titulo = 'Cuentas al día';
    saldoLbl = 'Saldo';
  }

  box.className = `deuda-box ${cls}`;
  box.innerHTML = `
    <div class="deuda-title ${cls}">${titulo}</div>
    <div class="deuda-grid">
      <div class="deuda-item">
        <span class="deuda-item-lbl">ZAS debe al talento (${Math.round(pctTal*100)}% de facturas)</span>
        <span class="deuda-item-val">${clp(zasDebePorFactura)}</span>
      </div>
      <div class="deuda-item">
        <span class="deuda-item-lbl">Ya pagado por ZAS</span>
        <span class="deuda-item-val" style="color:#1A7A47">${clp(yaPagado)}</span>
      </div>
      <div class="deuda-item">
        <span class="deuda-item-lbl">Talento debe a ZAS (${Math.round(pctZas*100)}% de boletas)</span>
        <span class="deuda-item-val">${clp(talentoDebePorBoleta)}</span>
      </div>
      <div class="deuda-item">
        <span class="deuda-item-lbl">${saldoLbl}</span>
        <span class="deuda-item-val" style="color:var(--${cls==='zas-debe'?'amber':cls==='talento-debe'?'blue':'muted'})">${clp(Math.abs(saldo))}</span>
      </div>
    </div>
    <div style="font-size:11px;color:var(--hint);margin-top:12px;line-height:1.5">
      Ventas: Factura ${clp(totalF)} · Boleta ${clp(totalB)}. El saldo = parte del talento en facturas
      − lo ya pagado − comisión ZAS sobre boletas. Las ventas históricas previas a 2025 están incluidas.
    </div>`;
}

function switchTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* ── GENERAL ── */
function renderGeneral(general){
  const keys=Object.keys(general).sort().reverse(); // más reciente primero
  const keysAsc=[...keys].reverse();
  let tF=0,tB=0;
  keys.forEach(k=>{tF+=general[k].f;tB+=general[k].b;});
  const tot=tF+tB;
  const tieneUSD=keys.some(k=>general[k].usd);

  const filas=keys.map(k=>{
    const{f,b,usd}=general[k];
    const t=f+b, pF=t?Math.round(f/t*100):0;
    return `<tr>
      <td><strong>${ml(k)}</strong></td>
      <td class="r" style="color:var(--blue)">${clp(f)}</td>
      <td class="r" style="color:var(--amber)">${clp(b)}</td>
      <td class="r"><strong>${clp(t)}</strong></td>
      <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pF}%"></div></div><span class="prg-lbl">${pF}% F</span></div></td>
      <td>${usd?'<span class="usd-tag">USD→CLP</span>':''}</td>
    </tr>`;
  }).join('');

  const pFt=tot?Math.round(tF/tot*100):0;

  document.getElementById('tab-general').innerHTML=`
    ${tieneUSD?'<div class="note">Ventas en USD convertidas a CLP con el dólar observado promedio mensual del Banco Central de Chile.</div>':''}
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Total neto</div><div class="kpi-val">${clp(tot)}</div><div class="kpi-sub">${DATA.total_ordenes} órdenes · Campañas Chile</div></div>
      <div class="kpi"><div class="kpi-lbl">Factura · entra a ZAS</div><div class="kpi-val blue">${clp(tF)}</div><div class="kpi-sub">${pct(tF,tot)} del total</div></div>
      <div class="kpi"><div class="kpi-lbl">Boleta · entra a tercero</div><div class="kpi-val amber">${clp(tB)}</div><div class="kpi-sub">${pct(tB,tot)} del total</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Detalle mes a mes</span></div>
      <div class="card-body">
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>Mes</th><th class="r">Factura</th><th class="r">Boleta</th>
            <th class="r">Total neto</th><th>Proporción F/B</th><th>FX</th>
          </tr></thead>
          <tbody>${filas}</tbody>
          <tfoot><tr class="total-row">
            <td>TOTAL</td>
            <td class="r" style="color:var(--blue)">${clp(tF)}</td>
            <td class="r" style="color:var(--amber)">${clp(tB)}</td>
            <td class="r">${clp(tot)}</td>
            <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pFt}%"></div></div><span class="prg-lbl">${pFt}% F</span></div></td>
            <td></td>
          </tr></tfoot>
        </table></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Evolución mensual</span>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:#1059A8"></div>Factura</div>
          <div class="leg"><div class="leg-dot" style="background:#E8920A"></div>Boleta</div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-wrap" style="height:${Math.max(180,keysAsc.length*46+60)}px">
          <canvas id="cG" role="img" aria-label="Gráfico mensual ZAS Chile"></canvas>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    if(c1){c1.destroy();c1=null;}
    c1=new Chart(document.getElementById('cG'),{
      type:'bar',
      data:{labels:keysAsc.map(ml),datasets:[
        {label:'Factura',data:keysAsc.map(k=>Math.round(general[k].f)),backgroundColor:'#1059A8',borderRadius:3},
        {label:'Boleta', data:keysAsc.map(k=>Math.round(general[k].b)),backgroundColor:'#E8920A',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+clp(c.raw)}}},
        scales:{
          x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11}},grid:{display:false}},
          y:{ticks:{callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v,font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}}
        }
      }
    });
  });
}

/* ── TALENTO ── */
function renderTalento(talentos){
  document.getElementById('tab-talento').innerHTML=`
    <div class="card">
      <div class="card-head"><span class="card-title">Buscar talento</span></div>
      <div class="card-body">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Escribí el nombre del talento…" oninput="filtrarChips()" autocomplete="off"/>
        </div>
        <div id="talentList"><span style="font-size:13px;color:var(--hint)">Escribí al menos 2 letras para buscar.</span></div>
      </div>
    </div>
    <div id="talDetalle"></div>`;
}

function filtrarChips(){
  const q=document.getElementById('searchInput').value.trim();
  const cont=document.getElementById('talentList');
  if(!cont)return;
  if(q.length<2){
    cont.innerHTML='<span style="font-size:13px;color:var(--hint)">Escribí al menos 2 letras para buscar.</span>';
    return;
  }
  const lista=Object.keys(DATA.talentos).sort();
  const filtrados=lista.filter(t=>t.toLowerCase().includes(q.toLowerCase()));
  if(!filtrados.length){
    cont.innerHTML='<span style="font-size:13px;color:var(--hint)">Sin resultados para "'+q+'".</span>';
    return;
  }
  cont.innerHTML=filtrados.map(t=>
    `<span class="talent-chip${talSel===t?' active':''}" onclick="mostrarTalento('${t.replace(/'/g,"\'")}')">
      ${t}
    </span>`
  ).join('');
}

/* ── DETALLE ÓRDENES POR MES ── */
function buildDetalleHTML(talento, mes){
  // Para "(Todos)" no hay ordenes individuales
  if(talento === '(Todos)') return '<em style="font-size:12px;color:var(--hint)">Seleccioná un talento para ver el detalle de órdenes.</em>';
  const mesData = (DATA.talentos[talento] || {})[mes];
  const ords = (mesData && mesData.ordenes) ? mesData.ordenes : [];
  if(!ords.length) return '<em style="font-size:12px;color:var(--hint)">Sin órdenes registradas para este mes.</em>';

  // Separar por tipo
  const facturas = ords.filter(o=>o.tipo==='Factura').sort((a,b)=>b.monto_clp-a.monto_clp);
  const boletas  = ords.filter(o=>o.tipo==='Boleta').sort((a,b)=>b.monto_clp-a.monto_clp);

  function filaOrden(o){
    const esUSD = o.moneda === 'USD';
    const montoOrig = esUSD ? `USD ${o.monto_orig.toLocaleString('es-CL')}` : '';
    return `<tr>
      <td style="color:var(--muted)">${o.orden}</td>
      <td>${o.nombre}</td>
      <td>${o.fecha||'—'}</td>
      <td><span class="pill ${o.tipo==='Factura'?'pill-f':'pill-b'}">${o.tipo}</span></td>
      <td class="r">${esUSD?`<span style="font-size:11px;color:var(--hint)">${montoOrig} →</span> `:''}${clp(o.monto_clp)}</td>
    </tr>`;
  }

  let html = '';
  if(facturas.length){
    const totF = facturas.reduce((s,o)=>s+o.monto_clp,0);
    html += `<div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Factura · ${clp(totF)}</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>N° Orden</th><th>Descripción</th><th>Fecha</th><th>Tipo</th><th class="r">Monto CLP</th></tr></thead>
        <tbody>${facturas.map(filaOrden).join('')}</tbody>
      </table></div>
    </div>`;
  }
  if(boletas.length){
    const totB = boletas.reduce((s,o)=>s+o.monto_clp,0);
    html += `<div>
      <div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Boleta · ${clp(totB)}</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>N° Orden</th><th>Descripción</th><th>Fecha</th><th>Tipo</th><th class="r">Monto CLP</th></tr></thead>
        <tbody>${boletas.map(filaOrden).join('')}</tbody>
      </table></div>
    </div>`;
  }
  return html;
}

function toggleDetalle(row, talento, mes){
  const dr = document.getElementById('dr-'+mes);
  if(!dr) return;
  const abierto = row.classList.toggle('abierto');
  dr.style.display = abierto ? '' : 'none';
}

function mostrarTalento(nombre){
  talSel=nombre;
  document.querySelectorAll('.talent-chip').forEach(c=>c.classList.toggle('active',c.textContent===nombre));
  const talentos=DATA.talentos;
  const lista=nombre==='(Todos)'?Object.keys(talentos):[nombre];
  const dataMes={};
  lista.forEach(t=>{
    if(!talentos[t])return;
    Object.entries(talentos[t]).forEach(([m,d])=>{
      if(!dataMes[m])dataMes[m]={f:0,b:0};
      dataMes[m].f+=d.f; dataMes[m].b+=d.b;
    });
  });
  const mesesDesc=Object.keys(dataMes).sort().reverse();
  const mesesAsc=[...mesesDesc].reverse();
  let tF=0,tB=0;
  mesesDesc.forEach(m=>{tF+=dataMes[m].f;tB+=dataMes[m].b;});
  const tot=tF+tB;
  const pFt=tot?Math.round(tF/tot*100):0;

  const talentoData = nombre==='(Todos)' ? null : DATA.talentos[nombre];
  const pagoInfo = nombre==='(Todos)' ? {total:0,n:0} : pagoTalento(nombre);

  const filas=mesesDesc.map(m=>{
    const{f,b}=dataMes[m];
    const t=f+b, pF=t?Math.round(f/t*100):0;
    const esActual = m === '2026-06';
    return `<tr class="mes-row${esActual?' abierto':''}" onclick="toggleDetalle(this,'${nombre}','${m}')">
      <td><span class="mes-toggle"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg><strong>${ml(m)}</strong></span></td>
      <td class="r" style="color:var(--blue)">${clp(f)}</td>
      <td class="r" style="color:var(--amber)">${clp(b)}</td>
      <td class="r"><strong>${clp(t)}</strong></td>
      <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pF}%"></div></div><span class="prg-lbl">${pF}% F</span></div></td>
    </tr>
    <tr class="detalle-row" id="dr-${m}" style="${esActual?'':'display:none'}">
      <td colspan="5"><div class="detalle-inner">${buildDetalleHTML(nombre,m)}</div></td>
    </tr>`;
  }).join('');

  // Bloque fee manual + balance
  let balanceHTML = '';
  if(nombre !== '(Todos)'){
    balanceHTML = `
    <div class="fee-input-wrap">
      <label for="pctZasInput">% ZAS para ${nombre}:</label>
      <input type="number" id="pctZasInput" min="0" max="100" step="1" placeholder="ej: 20" oninput="calcularBalance()" />
      <span class="fee-hint">Ingresá el porcentaje que le corresponde a ZAS según el acuerdo con este talento.</span>
    </div>
    <div id="balanceBox" class="deuda-box neutro">
      <div class="deuda-title neutro">Ingresá el % ZAS para ver el balance</div>
    </div>`
  }

  document.getElementById('talDetalle').innerHTML=balanceHTML+`
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Total neto vendido</div><div class="kpi-val">${clp(tot)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Factura</div><div class="kpi-val blue">${clp(tF)}</div><div class="kpi-sub">${pct(tF,tot)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Boleta</div><div class="kpi-val amber">${clp(tB)}</div><div class="kpi-sub">${pct(tB,tot)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Total pagado al talento</div><div class="kpi-val" style="color:#1A7A47">${clp(pagoInfo.total)}</div><div class="kpi-sub">${pagoInfo.n} pago${pagoInfo.n===1?'':'s'} · ZAS Chile</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Detalle mes a mes · ${nombre}</span></div>
      <div class="card-body">
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>Mes</th><th class="r">Factura</th><th class="r">Boleta</th>
            <th class="r">Total neto</th><th>Proporción F/B</th>
          </tr></thead>
          <tbody>${filas}</tbody>
          <tfoot><tr class="total-row">
            <td>TOTAL</td>
            <td class="r" style="color:var(--blue)">${clp(tF)}</td>
            <td class="r" style="color:var(--amber)">${clp(tB)}</td>
            <td class="r">${clp(tot)}</td>
            <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pFt}%"></div></div><span class="prg-lbl">${pFt}% F</span></div></td>
          </tr></tfoot>
        </table></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Evolución mensual · ${nombre}</span>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:#1059A8"></div>Factura</div>
          <div class="leg"><div class="leg-dot" style="background:#E8920A"></div>Boleta</div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-wrap" style="height:${Math.max(180,mesesAsc.length*46+60)}px">
          <canvas id="cT" role="img" aria-label="Gráfico talento ${nombre}"></canvas>
        </div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    if(c2){c2.destroy();c2=null;}
    c2=new Chart(document.getElementById('cT'),{
      type:'bar',
      data:{labels:mesesAsc.map(ml),datasets:[
        {label:'Factura',data:mesesAsc.map(m=>Math.round(dataMes[m].f)),backgroundColor:'#1059A8',borderRadius:3},
        {label:'Boleta', data:mesesAsc.map(m=>Math.round(dataMes[m].b)),backgroundColor:'#E8920A',borderRadius:3},
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+clp(c.raw)}}},
        scales:{
          x:{ticks:{autoSkip:false,maxRotation:45,font:{size:11}},grid:{display:false}},
          y:{ticks:{callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v,font:{size:11}},grid:{color:'rgba(0,0,0,.05)'}}
        }
      }
    });
  });
}

/* ── INIT ── */
fetch('./data.json?t='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('data.json no encontrado (HTTP '+r.status+')');return r.json();})
  .then(d=>{
    DATA=d;
    const upd=new Date(d.updated_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('subtitle').textContent=`Datos al ${upd} · ${d.total_ordenes} órdenes en Odoo + ventas históricas · Campañas Chile · se actualiza todos los días a las 8:30 hs`;
    renderGeneral(d.general);
    renderTalento(d.talentos);
  })
  .catch(e=>{
    document.getElementById('tab-general').innerHTML=
      `<div class="err"><strong>No se pudo cargar data.json</strong><br>${e.message}<br><br>El archivo se genera automáticamente cada mañana a las 8:30 hs. Si es la primera vez, ejecutá el workflow manualmente desde GitHub Actions.</div>`;
    document.getElementById('subtitle').textContent='Sin datos disponibles aún';
  });
</script>
</body>
</html>
