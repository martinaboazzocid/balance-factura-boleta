<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAS Chile · Factura vs Boleta</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #F5F4EF; --card: #FFFFFF; --border: #E4E3DC;
    --text: #16161A; --muted: #6B6966; --hint: #A09D97;
    --blue: #1059A8; --blue-bg: #EAF1FB;
    --amber: #9A5200; --amber-bg: #FEF3E3;
    --green: #1A6E45; --r: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .shell { max-width: 1080px; margin: 0 auto; padding: 30px 20px 60px; }
  .hdr { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
  .hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .hdr p  { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .tabs-nav { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 22px; }
  .tab-btn { padding: 10px 20px; font-size: 14px; font-weight: 600; border: none; background: none; cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color .12s; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-btn:hover { color: var(--text); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 18px; overflow: hidden; }
  .card-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding: 16px 18px 0; }
  .card-title { font-size: 14px; font-weight: 700; }
  .card-body { padding: 16px 18px 18px; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .kpi { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; }
  .kpi-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
  .kpi-val { font-size: 23px; font-weight: 700; letter-spacing: -.5px; line-height: 1; }
  .kpi-sub { font-size: 12px; color: var(--hint); margin-top: 4px; }
  .kpi-val.blue  { color: var(--blue); }
  .kpi-val.amber { color: var(--amber); }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .chart-wrap { position: relative; width: 100%; }
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 8px 11px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
  th.r, td.r { text-align: right; }
  td { padding: 9px 11px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #FAFAF7; }
  tr.total-row td { background: #F3F2EE; font-weight: 700; border-top: 1px solid #D0CFC8; border-bottom: none; }
  .prg { display: flex; align-items: center; gap: 6px; }
  .prg-bar { flex: 1; min-width: 60px; height: 5px; background: #EDECEA; border-radius: 3px; overflow: hidden; }
  .prg-fill { height: 100%; background: var(--blue); border-radius: 3px; }
  .prg-lbl { font-size: 11px; color: var(--hint); min-width: 34px; text-align: right; }
  .talent-sel { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .talent-sel label { font-size: 13px; font-weight: 600; color: var(--muted); }
  .talent-sel select { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--r); font-size: 13px; background: var(--card); color: var(--text); cursor: pointer; outline: none; min-width: 220px; }
  .talent-sel select:focus { border-color: var(--blue); }
  .state-box { text-align: center; padding: 50px 20px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin .65s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .state-box p  { font-size: 13px; color: var(--muted); max-width: 360px; margin: 0 auto; }
  .usd-tag { font-size: 10px; background: #EEEDEA; color: var(--hint); padding: 1px 5px; border-radius: 3px; }
  .note { background: #FEF9E7; border: 1px solid #F5E07A; border-radius: var(--r); padding: 10px 14px; font-size: 12px; color: #856400; margin-bottom: 16px; line-height: 1.55; }
  .err { background: #FDEAEA; border: 1px solid #F5C0C0; border-radius: var(--r); padding: 14px 16px; font-size: 13px; color: #9B1C1C; line-height: 1.6; }
  @media (max-width: 580px) { .shell { padding: 18px 14px 50px; } .kpi-val { font-size: 19px; } }
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div>
      <h1>ZAS Chile · Factura vs Boleta</h1>
      <p id="subtitle">Cargando…</p>
    </div>
  </div>

  <div class="tabs-nav">
    <button class="tab-btn active" onclick="tab('general',this)">Venta general</button>
    <button class="tab-btn"        onclick="tab('talento',this)">Por talento</button>
  </div>

  <div id="tab-general" class="tab-pane active">
    <div class="card"><div class="card-body">
      <div class="state-box"><div class="spinner"></div><h3>Cargando datos…</h3></div>
    </div></div>
  </div>

  <div id="tab-talento" class="tab-pane">
    <div class="card"><div class="card-body">
      <div class="state-box"><h3>Abrí primero "Venta general"</h3></div>
    </div></div>
  </div>

</div>

<script>
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let c1 = null, c2 = null;
let DATA = null;

function clp(n) { return '$\u202F' + Math.round(n).toLocaleString('es-CL'); }
function ml(k)  { const [y,m]=k.split('-'); return MESES[+m-1]+' '+y.slice(2); }
function pct(a,t){ return t ? Math.round(a/t*100)+'%' : '—'; }

function tab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

/* ── RENDER GENERAL ── */
function renderGeneral(general) {
  const keys = Object.keys(general).sort();
  let tF=0, tB=0, tN=0;
  keys.forEach(k => { tF+=general[k].f; tB+=general[k].b; tN+=general[k].n; });
  const tot = tF+tB+tN;
  const tieneUSD = keys.some(k => general[k].usd);

  const filas = keys.map(k => {
    const {f,b,n,usd} = general[k];
    const t = f+b+n, pF = t ? Math.round(f/t*100) : 0;
    return `<tr>
      <td><strong>${ml(k)}</strong></td>
      <td class="r" style="color:var(--blue)">${clp(f)}</td>
      <td class="r" style="color:var(--amber)">${clp(b)}</td>
      <td class="r">${n>0?clp(n):'—'}</td>
      <td class="r"><strong>${clp(t)}</strong></td>
      <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pF}%"></div></div><span class="prg-lbl">${pF}% F</span></div></td>
      <td>${usd?'<span class="usd-tag">USD→CLP</span>':''}</td>
    </tr>`;
  }).join('');

  const pFt = tot ? Math.round(tF/tot*100) : 0;

  document.getElementById('tab-general').innerHTML = `
    ${tieneUSD?`<div class="note">Ventas en USD convertidas a CLP con el dólar observado promedio mensual del Banco Central de Chile.</div>`:''}
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-lbl">Total neto</div><div class="kpi-val">${clp(tot)}</div><div class="kpi-sub">${DATA.total_ordenes} órdenes</div></div>
      <div class="kpi"><div class="kpi-lbl">Factura · entra a ZAS</div><div class="kpi-val blue">${clp(tF)}</div><div class="kpi-sub">${pct(tF,tot)} del total</div></div>
      <div class="kpi"><div class="kpi-lbl">Boleta · entra a tercero</div><div class="kpi-val amber">${clp(tB)}</div><div class="kpi-sub">${pct(tB,tot)} del total</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <span class="card-title">Importe neto mensual en CLP</span>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:#1059A8"></div>Factura</div>
          <div class="leg"><div class="leg-dot" style="background:#E8920A"></div>Boleta</div>
        </div>
      </div>
      <div class="card-body">
        <div class="chart-wrap" style="height:${Math.max(180,keys.length*46+60)}px">
          <canvas id="cG" role="img" aria-label="Gráfico mensual ZAS Chile"></canvas>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Detalle mes a mes</span></div>
      <div class="card-body">
        <div class="tbl-wrap"><table>
          <thead><tr><th>Mes</th><th class="r">Factura</th><th class="r">Boleta</th><th class="r">Sin tipo</th><th class="r">Total neto</th><th>Proporción F/B</th><th>FX</th></tr></thead>
          <tbody>${filas}</tbody>
          <tfoot><tr class="total-row">
            <td>TOTAL</td>
            <td class="r" style="color:var(--blue)">${clp(tF)}</td>
            <td class="r" style="color:var(--amber)">${clp(tB)}</td>
            <td class="r">${tN>0?clp(tN):'—'}</td>
            <td class="r">${clp(tot)}</td>
            <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pFt}%"></div></div><span class="prg-lbl">${pFt}% F</span></div></td>
            <td></td>
          </tr></tfoot>
        </table></div>
      </div>
    </div>`;

  requestAnimationFrame(() => {
    if (c1) { c1.destroy(); c1=null; }
    c1 = new Chart(document.getElementById('cG'), {
      type:'bar',
      data:{ labels:keys.map(ml), datasets:[
        {label:'Factura', data:keys.map(k=>Math.round(general[k].f)), backgroundColor:'#1059A8', borderRadius:3},
        {label:'Boleta',  data:keys.map(k=>Math.round(general[k].b)), backgroundColor:'#E8920A', borderRadius:3},
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>' '+clp(c.raw)}} },
        scales:{
          x:{ ticks:{autoSkip:false,maxRotation:45,font:{size:11}}, grid:{display:false} },
          y:{ ticks:{ callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v, font:{size:11} }, grid:{color:'rgba(0,0,0,.05)'} }
        }
      }
    });
  });
}

/* ── RENDER TALENTO ── */
function renderTalento(talentos) {
  const lista = Object.keys(talentos).sort();
  const opciones = ['(Todos los talentos)', ...lista].map(t =>
    `<option value="${t}">${t}</option>`).join('');

  document.getElementById('tab-talento').innerHTML = `
    <div class="card">
      <div class="card-head">
        <span class="card-title">Detalle por talento</span>
        <div class="talent-sel">
          <label>Talento:</label>
          <select id="selT" onchange="renderDetalleTalento()">${opciones}</select>
        </div>
      </div>
      <div class="card-body">
        <div id="talKpis" class="kpi-row" style="margin-bottom:14px"></div>
        <div class="chart-wrap" id="talChartWrap" style="height:220px;margin-bottom:18px">
          <canvas id="cT" role="img" aria-label="Gráfico talento"></canvas>
        </div>
        <div class="tbl-wrap" id="talTabla"></div>
      </div>
    </div>`;

  renderDetalleTalento();
}

function renderDetalleTalento() {
  const talentos = DATA.talentos;
  const sel = document.getElementById('selT').value;
  const lista = sel === '(Todos los talentos)' ? Object.keys(talentos) : [sel];

  const dataMes = {};
  lista.forEach(t => {
    if (!talentos[t]) return;
    Object.entries(talentos[t]).forEach(([m,d]) => {
      if (!dataMes[m]) dataMes[m] = {f:0,b:0,n:0};
      dataMes[m].f += d.f; dataMes[m].b += d.b; dataMes[m].n += d.n;
    });
  });

  const meses = Object.keys(dataMes).sort();
  let tF=0,tB=0,tN=0;
  meses.forEach(m=>{ tF+=dataMes[m].f; tB+=dataMes[m].b; tN+=dataMes[m].n; });
  const tot = tF+tB+tN;

  document.getElementById('talKpis').innerHTML = `
    <div class="kpi"><div class="kpi-lbl">Total neto</div><div class="kpi-val">${clp(tot)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Factura</div><div class="kpi-val blue">${clp(tF)}</div><div class="kpi-sub">${pct(tF,tot)}</div></div>
    <div class="kpi"><div class="kpi-lbl">Boleta</div><div class="kpi-val amber">${clp(tB)}</div><div class="kpi-sub">${pct(tB,tot)}</div></div>`;

  const pFt = tot ? Math.round(tF/tot*100) : 0;
  const filas = meses.map(m => {
    const {f,b,n} = dataMes[m];
    const t=f+b+n, pF=t?Math.round(f/t*100):0;
    return `<tr>
      <td><strong>${ml(m)}</strong></td>
      <td class="r" style="color:var(--blue)">${clp(f)}</td>
      <td class="r" style="color:var(--amber)">${clp(b)}</td>
      <td class="r">${n>0?clp(n):'—'}</td>
      <td class="r"><strong>${clp(t)}</strong></td>
      <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pF}%"></div></div><span class="prg-lbl">${pF}% F</span></div></td>
    </tr>`;
  }).join('');

  document.getElementById('talTabla').innerHTML = `<table>
    <thead><tr><th>Mes</th><th class="r">Factura</th><th class="r">Boleta</th><th class="r">Sin tipo</th><th class="r">Total neto</th><th>Proporción F/B</th></tr></thead>
    <tbody>${filas}</tbody>
    <tfoot><tr class="total-row">
      <td>TOTAL</td>
      <td class="r" style="color:var(--blue)">${clp(tF)}</td>
      <td class="r" style="color:var(--amber)">${clp(tB)}</td>
      <td class="r">${tN>0?clp(tN):'—'}</td>
      <td class="r">${clp(tot)}</td>
      <td><div class="prg"><div class="prg-bar"><div class="prg-fill" style="width:${pFt}%"></div></div><span class="prg-lbl">${pFt}% F</span></div></td>
    </tr></tfoot>
  </table>`;

  const w = document.getElementById('talChartWrap');
  if (w) w.style.height = Math.max(180, meses.length*46+60)+'px';

  requestAnimationFrame(() => {
    if (c2) { c2.destroy(); c2=null; }
    const ctx = document.getElementById('cT');
    if (!ctx) return;
    c2 = new Chart(ctx, {
      type:'bar',
      data:{ labels:meses.map(ml), datasets:[
        {label:'Factura', data:meses.map(m=>Math.round(dataMes[m].f)), backgroundColor:'#1059A8', borderRadius:3},
        {label:'Boleta',  data:meses.map(m=>Math.round(dataMes[m].b)), backgroundColor:'#E8920A', borderRadius:3},
      ]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>' '+clp(c.raw)}} },
        scales:{
          x:{ ticks:{autoSkip:false,maxRotation:45,font:{size:11}}, grid:{display:false} },
          y:{ ticks:{callback:v=>v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v, font:{size:11}}, grid:{color:'rgba(0,0,0,.05)'} }
        }
      }
    });
  });
}

/* ── INIT ── */
fetch('./data.json?t=' + Date.now())
  .then(r => {
    if (!r.ok) throw new Error('data.json no encontrado (HTTP '+r.status+')');
    return r.json();
  })
  .then(d => {
    DATA = d;
    const upd = new Date(d.updated_at).toLocaleString('es-AR', {
      day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
    });
    document.getElementById('subtitle').textContent =
      `Datos al ${upd} · ${d.total_ordenes} órdenes · se actualiza automáticamente cada día a las 8:30 hs`;
    renderGeneral(d.general);
    renderTalento(d.talentos);
  })
  .catch(e => {
    document.getElementById('tab-general').innerHTML =
      `<div class="err"><strong>No se pudo cargar data.json</strong><br>${e.message}<br><br>
       El archivo se genera automáticamente cada mañana a las 8:30 hs. Si es la primera vez que abrís esto, puede que todavía no se haya generado. Volvé a intentarlo mañana o ejecutá el workflow manualmente desde GitHub Actions.</div>`;
    document.getElementById('subtitle').textContent = 'Sin datos disponibles aún';
  });
</script>
</body>
</html>
